<!DOCTYPE html>
<html lang="zh_TW-Hant">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono&family=Noto+Serif+TC&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header"><span class="branding">Gene's Content Distribution Project</span></div>
    <div class="main">

            </p>

        </div>
        <div class="socialAccounts">
            <h1>社群帳號</h1>
            <p><a href="https://www.youtube.com/channel/UC1BPf9TI4Fd32-lbEyOeQNw" target="_blank" rel="noopener noreferrer">YouTube (GMPP)</a>、<a href="https://www.instagram.com/genec.dev/" target="_blank" rel="noopener noreferrer">Instagram (@genec.dev)</a></ul>

    </div>
</body>
<style>
     :root {
        --header-height: 50px;
    }
    
    * {
        box-sizing: border-box;
    }
    
    body {
        margin: 0px;
        margin-top: calc(var(--header-height));
        padding: 0px;
        display: flex;
        justify-content: center;
        background-color: #fff7e9;
    }
    
    a {
        text-decoration: none;
        color: inherit;
    }
    
    a:hover {
        color: #afafaf;
    }
    
    h1 {
        font-size: 1.5rem;
        margin: 0px;
    }
    
    p {
        margin: 0px;
    }
    
    .header {
        color: rgb(84, 55, 0);
        background-color: #f9a825;
        text-align: center;
        position: fixed;
        top: 0;
        width: 100vw;
        height: var(--header-height);
        display: flex;
        flex-direction: column;
        justify-content: center;
        /* margin: 10px; */
        /* box-shadow: 0px 0px 10px 2px rgba(155, 101, 0, 0.23); */
        /* border-radius: 30px; */
        z-index: 10;
    }
    
    .main {
        max-width: 767px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        transform: translateY(1.5%);
        opacity: 0;
        font-family: 'Noto Sans TC', sans-serif;
    }
    
    .main.display {
        transition: 0.4s;
        transition-timing-function: cubic-bezier(.14, .35, 0, 1);
        transform: translateY(0);
        opacity: 1;
    }
    
    .main div {
        border-radius: 30px;
        background-color: #ffeac6;
        color: rgb(105, 68, 0);
        margin: 5px;
        padding: 25px;
    }
    
    .branding {
        font-family: 'Noto Sans Mono', monospace;
    }
</style>

<script>
    const earlyIntroText = document.querySelector(".main")
    window.addEventListener("load", function(event) {
        earlyIntroText.classList.add("display");
    });
</script>

</html>
