<style>
     :root {
        --header-height: 50px;
        --navbar-height: 70px;
        --theme-light: #e8d777;
        --theme-background-light: #FBF1CA;
        --theme-text-light: #564c00;
    }
    
    * {
        box-sizing: border-box;
    }
    
    body {
        margin: 0px;
        margin-top: var(--header-height);
        margin-bottom: var(--navbar-height);
        padding: 0px;
        display: flex;
        justify-content: center;
        background-color: var(--theme-background-light);
    }
    
    a {
        text-decoration: none;
        color: inherit;
        -webkit-tap-highlight-color: transparent;
    }
    
    h1 {
        font-size: 1.65rem;
        margin: 0px;
    }
    
    p {
        margin: 0px;
    }
    
    .header {
        color: var(--theme-text-light);
        background-color: var(--theme-light);
        text-align: center;
        position: fixed;
        top: 0;
        width: 100vw;
        height: var(--header-height);
        display: flex;
        flex-direction: column;
        justify-content: center;
        /* margin: 10px; */
        /* box-shadow: 0px 0px 10px 2px rgba(155, 101, 0, 0.23); */
        /* border-radius: 30px; */
        z-index: 10;
    }
    
    .nav--mobile {
        position: fixed;
        bottom: 0;
        height: var(--navbar-height);
        width: 100vw;
        background-color: var(--theme-light);
        display: flex;
        /* justify-content: space-evenly; */
        overflow-x: auto;
        color: var(--theme-text-light);
        z-index: 10;
    }
    
    .nav__link {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex-grow: 1;
        font-size: 12px;
        transition: 0.4s;
        transition-timing-function: cubic-bezier(.14, .35, 0, 1);
    }
    
    .nav__link:active {
        transition: 0.1s;
        transform: scale(.8);
    }
    
    .material-icons {
        font-family: 'Material Icons';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        /* Preferred icon size */
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
        /* Support for all WebKit browsers. */
        -webkit-font-smoothing: antialiased;
        /* Support for Safari and Chrome. */
        text-rendering: optimizeLegibility;
        /* Support for Firefox. */
        -moz-osx-font-smoothing: grayscale;
        /* Support for IE. */
        font-feature-settings: 'liga';
    }
    
    .main {
        max-width: 767px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        transform: translateY(10px);
        opacity: 0;
        font-family: 'Noto Sans TC', sans-serif;
    }
    
    .main.display {
        transition: 0.4s;
        transition-timing-function: cubic-bezier(.14, .35, 0, 1);
        transform: translateY(0);
        opacity: 1;
    }
    
    .main div {
        border-radius: 25px;
        background-color: var(--theme-light);
        color: var(--theme-text-light);
        margin: 5px 5px 15px 5px;
        padding: 25px;
        /* box-shadow: 0px 0px 10px #80808021; */
    }
    
    .main div p {
        font-family: 'Noto Sans Mono', monospace, 'Noto Serif TC', serif;
        text-align: justify;
        line-height: 2;
    }
    
    .main div p a {
        font-weight: bold;
        text-decoration: underline;
    }
    
    .branding {
        font-family: 'Noto Sans Mono', monospace;
    }
</style>

</script>
