<!DOCTYPE html>
<html lang="zh_TW-Hant">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#795548">
    <title>GeneC's Page</title>

    <!-- CSS Import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono&family=Noto+Serif+TC&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header"><span class="branding">Gene's Content Distribution Project</span></div>
    <div class="main">
        <div class="earlyIntro">
            <p>網站正在建立中 ⋯⋯</p>
        </div>
    </div>
</body>
<style>
    body {
        margin: 0px;
        padding: 0px;
    }
    
    .header {
        color: rgb(84, 55, 0);
        background-color: orange;
        text-align: center;
        position: absolute;
        top: 0;
        width: 100vw;
        padding: 15px 0px;
        box-shadow: 0px 0px 3px 2px rgba(196, 127, 0, 0.556);
        z-index: 1000;
    }
    
    .main {
        margin-top: 65px;
        display: flex;
        justify-content: center;
        transform: translateY(20%);
        opacity: 0;
    }
    
    .main.display {
        transition: 0.4s;
        transition-timing-function: cubic-bezier(.14, .35, 0, 1);
        transform: translateY(0);
        opacity: 1;
    }
    
    .earlyIntro {
        font-family: 'Noto Serif TC', serif;
        text-shadow: 0px 0px 2px rgba(0, 0, 0, 0);
        color: rgb(42, 42, 42);
    }
    
    .branding {
        font-family: 'Noto Sans Mono', monospace;
    }
</style>

<script>
    const earlyIntroText = document.querySelector(".main")
    window.addEventListener("load", function(event) {
        earlyIntroText.classList.add("display");
    });
</script>

</html>
